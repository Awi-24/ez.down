name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux
          - platform: windows-latest
            label: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri build

      - name: Upload platform bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.label }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            version="$(jq -r .version src-tauri/tauri.conf.json)"
            echo "name=v${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: List installer files
        run: |
          find artifacts -type f \( -name '*-setup.exe' -o -name '*.deb' -o -name '*.AppImage' \) -print

      - name: Publish GitHub Release with installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ez.down ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          body: |
            ## Instaladores

            | Plataforma | Arquivo |
            | ---------- | ------- |
            | Windows | `*-setup.exe` (instalador NSIS) |
            | Linux | `.deb` e `.AppImage` |

            O GitHub também anexa automaticamente os arquivos de código-fonte (zip/tar.gz).
          draft: false
          prerelease: false
          files: |
            artifacts/**/*-setup.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
