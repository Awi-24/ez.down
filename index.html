<!doctype html>
<html lang="en" data-theme="notebook">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ez.down</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">ez.down</span>
          <div class="sidebar-actions edit-only">
            <button id="new-file" class="icon-btn" title="New document (Ctrl+N)"></button>
            <button id="open-file" class="icon-btn" title="Open file (Ctrl+O)"></button>
            <button id="open-folder" class="icon-btn" title="Open folder"></button>
          </div>
        </div>
        <div id="file-tree" class="file-tree"></div>
        <div id="settings-panel" class="settings-panel" hidden></div>
        <footer class="sidebar-footer">
          <button id="settings-toggle" class="sidebar-settings-btn" type="button" aria-expanded="false"></button>
        </footer>
      </aside>

      <main class="workspace">
        <div class="topbar">
          <div class="topbar-leading">
            <div class="window-dots" aria-hidden="true">
              <span class="window-dot close"></span>
              <span class="window-dot minimize"></span>
              <span class="window-dot maximize"></span>
            </div>
            <button id="toggle-sidebar" class="icon-btn" title="Toggle sidebar (Ctrl+B)"></button>
          </div>
          <div id="tabbar" class="tabbar"></div>
          <div class="topbar-actions">
            <button id="export-pdf" class="icon-btn" title="Export to PDF"></button>
          </div>
        </div>

        <div id="editor-host" class="editor-host"></div>

        <div id="empty-state" class="empty-state">
          <div class="empty-card">
            <h1>ez.down</h1>
            <p>Edit formatted Markdown without seeing the syntax.</p>
            <div class="empty-actions">
              <button id="empty-new-file" class="btn btn-primary edit-only"></button>
              <button id="empty-open-file" class="btn"></button>
              <button id="empty-open-folder" class="btn"></button>
            </div>
          </div>
        </div>

        <footer id="statusbar" class="statusbar" hidden>
          <div class="status-left">
            <span class="status-item" id="st-words"></span>
            <span class="status-item" id="st-chars"></span>
            <span class="status-item" id="st-lines"></span>
          </div>
          <div class="status-right">
            <span class="status-item" id="st-size"></span>
            <span class="status-item" id="st-modified"></span>
          </div>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
