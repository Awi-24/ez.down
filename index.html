<!doctype html>
<html lang="en" data-theme="notebook">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ez.down</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">ez.down</span>
          <div class="sidebar-actions">
            <button id="new-file" class="icon-btn" title="New document (Ctrl+N)"></button>
            <button id="open-file" class="icon-btn" title="Open file (Ctrl+O)"></button>
            <button id="open-folder" class="icon-btn" title="Open folder"></button>
            <button id="toggle-sidebar" class="icon-btn" title="Collapse sidebar (Ctrl+B)"></button>
          </div>
        </div>
        <div id="file-tree" class="file-tree"></div>
      </aside>

      <main class="workspace">
        <div class="topbar">
          <button id="show-sidebar" class="icon-btn topbar-toggle" title="Show sidebar (Ctrl+B)"></button>
          <div id="tabbar" class="tabbar"></div>
          <div class="topbar-actions">
            <select id="theme-select" class="theme-select" title="Appearance">
              <optgroup label="Light">
                <option value="notebook">Notebook</option>
                <option value="github">GitHub</option>
                <option value="vscode-light">VS Code Light</option>
                <option value="solarized-light">Solarized Light</option>
              </optgroup>
              <optgroup label="Dark">
                <option value="dracula">Dracula</option>
                <option value="nord">Nord</option>
                <option value="solarized-dark">Solarized Dark</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="vscode-dark">VS Code Dark</option>
              </optgroup>
            </select>
          </div>
        </div>

        <div id="editor-host" class="editor-host"></div>

        <div id="empty-state" class="empty-state">
          <div class="empty-card">
            <h1>ez.down</h1>
            <p>Edit formatted Markdown without seeing the syntax.</p>
            <div class="empty-actions">
              <button id="empty-new-file" class="btn btn-primary"></button>
              <button id="empty-open-file" class="btn"></button>
              <button id="empty-open-folder" class="btn"></button>
            </div>
          </div>
        </div>

        <footer id="statusbar" class="statusbar" hidden>
          <div class="status-left">
            <span class="status-item" id="st-words"></span>
            <span class="status-item" id="st-chars"></span>
            <span class="status-item" id="st-lines"></span>
          </div>
          <div class="status-right">
            <span class="status-item" id="st-size"></span>
            <span class="status-item" id="st-modified"></span>
          </div>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
